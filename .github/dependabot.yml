# Dependabot 依赖自动更新配置
# 详见 https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # GitHub Actions 工作流依赖
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: chore
      include: scope

  # 前端 npm 依赖（frontend 初始化 package.json 后生效）
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - frontend
    commit-message:
      prefix: chore
      include: scope
    # 前端尚未初始化，暂时忽略
    ignore:
      - dependency-name: "*"

  # 后端 Python 依赖（backend 初始化 requirements/pyproject 后生效）
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - backend
    commit-message:
      prefix: chore
      include: scope
    ignore:
      - dependency-name: "*"
