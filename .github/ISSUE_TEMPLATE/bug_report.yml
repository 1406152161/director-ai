name: Bug 报告
description: 报告项目中的缺陷或异常行为
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢报告 Bug！请尽量提供完整信息，便于快速定位问题。

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 清晰、简洁地描述遇到的问题
      placeholder: 例如：生成关键帧时角色服装与上一镜头不一致
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 列出复现该 Bug 的操作步骤
      placeholder: |
        1. 进入「导演工作台」
        2. 点击「生成关键帧」
        3. 观察结果
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本 / 分支
      description: 例如 v0.1.0 或 dev@abc1234
      placeholder: dev

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - Windows
        - macOS
        - Linux
        - 其他

  - type: textarea
    id: logs
    attributes:
      label: 日志 / 截图
      description: 如有错误日志或截图，请粘贴或上传
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: 确认
      options:
        - label: 我已搜索现有 Issue，确认没有重复报告
          required: true
