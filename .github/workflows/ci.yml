# 持续集成（CI）工作流
# 在 push / PR 到 main 或 dev 分支时自动执行基础检查

name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# 同一 PR 的新 push 会取消进行中的旧任务，节省 CI 资源
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 仓库结构与必要文件检查（前后端代码就绪后可扩展 lint/test）
  repository-check:
    name: 仓库结构检查
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 验证必要文件存在
        run: |
          echo "当前分支: ${{ github.ref_name }}"
          test -f README.md
          test -f LICENSE
          test -f CONTRIBUTING.md
          test -f CHANGELOG.md
          test -f .gitignore
          test -f .editorconfig
          test -f .env.example
          echo "✅ 必要文件检查通过"

      - name: 验证 GitHub 模板存在
        run: |
          test -f .github/pull_request_template.md
          test -f .github/ISSUE_TEMPLATE/bug_report.yml
          test -f .github/ISSUE_TEMPLATE/feature_request.yml
          echo "✅ GitHub 模板检查通过"

