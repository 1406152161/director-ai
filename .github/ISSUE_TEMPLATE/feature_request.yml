name: 功能建议
description: 提出新功能或改进建议
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议！请说明使用场景与预期价值。

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 动机
      description: 当前遇到了什么问题，或为什么需要这个功能？
      placeholder: 例如：批量导出镜头时无法选择分辨率
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你期望如何实现或如何表现？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 是否考虑过其他实现方式？

  - type: dropdown
    id: priority
    attributes:
      label: 优先级（主观评估）
      options:
        - 高 — 阻塞核心流程
        - 中 — 提升效率/体验
        - 低 — 锦上添花

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、参考链接、类似产品等
